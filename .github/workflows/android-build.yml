name: Build Android AAB

# Lancement manuel depuis l'onglet "Actions" de GitHub.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site web
        run: npm run build

      - name: Synchroniser Capacitor (Android)
        run: npx cap sync android

      - name: Restaurer le keystore depuis les secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/memori.keystore
          SIZE=$(wc -c < android/memori.keystore)
          echo "Keystore décodé : $SIZE octets"
          if [ "$SIZE" -lt 500 ]; then
            echo "::error::Le keystore décodé est trop petit ($SIZE octets). Vérifie le secret KEYSTORE_BASE64."
            exit 1
          fi
          cat > android/keystore.properties <<EOF
          storeFile=memori.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Builder le bundle signé (.aab)
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease --stacktrace

      - name: Nettoyer les fichiers sensibles
        if: always()
        run: rm -f android/memori.keystore android/keystore.properties

      - name: Publier le .aab en artefact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: memori-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
