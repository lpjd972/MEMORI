<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B000FF" />
      <stop offset="45%" stop-color="#5B3CFF" />
      <stop offset="100%" stop-color="#00F0FF" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="50" cy="50" r="50" fill="#030305"/>

  <g filter="url(#glow)">
    <!-- Left lobe / card -->
    <path d="M 28 20 A 4 4 0 0 0 20 23 L 14 65 A 4 4 0 0 0 17 70 L 32 75 A 4 4 0 0 0 37 72 L 43 30 A 4 4 0 0 0 40 25 Z"
          fill="url(#neonGradient)" fill-opacity="0.15"
          stroke="url(#neonGradient)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Right lobe / card -->
    <path d="M 72 20 A 4 4 0 0 1 80 23 L 86 65 A 4 4 0 0 1 83 70 L 68 75 A 4 4 0 0 1 63 72 L 57 30 A 4 4 0 0 1 60 25 Z"
          fill="url(#neonGradient)" fill-opacity="0.15"
          stroke="url(#neonGradient)" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Center card -->
    <rect x="36" y="12" width="28" height="66" rx="5"
          fill="url(#neonGradient)" fill-opacity="0.2"
          stroke="url(#neonGradient)" stroke-width="3" />

    <!-- Neural pathway -->
    <path d="M 12 55 L 26 55 L 36 45 L 50 52 L 64 45 L 74 55 L 88 55"
          fill="none" stroke="#FFFFFF" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />

    <!-- Sync nodes -->
    <circle cx="50" cy="52" r="3" fill="#FFFFFF"/>
    <circle cx="26" cy="55" r="2" fill="#00F0FF" />
    <circle cx="74" cy="55" r="2" fill="#B000FF" />

    <!-- Circuit details on center card -->
    <line x1="42" y1="25" x2="58" y2="25" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="42" y1="35" x2="58" y2="35" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="46" y1="65" x2="54" y2="65" stroke="url(#neonGradient)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
